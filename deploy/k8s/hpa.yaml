apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: deepvol-api-hpa
  namespace: deepvol
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: deepvol-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Pods
    pods:
      metric:
        name: gpu_duty_cycle
      target:
        type: AverageValue
        averageValue: "80"
  - type: Pods
    pods:
      metric:
        name: websocket_active_connections
      target:
        type: AverageValue
        averageValue: "100"
