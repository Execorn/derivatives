apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deepvol-ingress
  namespace: deepvol
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Persistent WebSocket keepalives: prevent connections from dropping during inactivity
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "15"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket support: HTTP/1.1 and direct forwarding without buffering
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # Zero-copy write buffers: prevent disk write buffering for streaming/socket performance
    nginx.ingress.kubernetes.io/proxy-max-temp-file-size: "0"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: deepvol-api
            port:
              number: 8000
