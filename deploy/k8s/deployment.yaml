apiVersion: v1
kind: Namespace
metadata:
  name: deepvol
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepvol-api
  namespace: deepvol
  labels:
    app: deepvol-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deepvol-api
  template:
    metadata:
      labels:
        app: deepvol-api
    spec:
      containers:
      - name: api-server
        image: gcr.io/deepvol-project/deepvol-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: REDIS_HOST
          value: "redis-master.deepvol.svc"
        - name: REDIS_PORT
          value: "6379"
        - name: DB_URL
          value: "postgresql://deepvol:deepvol_password@postgres-service.deepvol.svc:5432/deepvol_archive"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-cluster-kafka-bootstrap.kafka.svc:9092"
        # SOTA Optimization: PostgreSQL Connection Pool sizing for API
        - name: PG_POOL_MIN_SIZE
          value: "10"
        - name: PG_POOL_MAX_SIZE
          value: "50"
        - name: PG_POOL_TIMEOUT
          value: "30.0"
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "1"
            memory: 2Gi
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: deepvol-api
  namespace: deepvol
  labels:
    app: deepvol-api
spec:
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: deepvol-api
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepvol-worker
  namespace: deepvol
  labels:
    app: deepvol-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deepvol-worker
  template:
    metadata:
      labels:
        app: deepvol-worker
    spec:
      containers:
      - name: calibrator
        image: gcr.io/deepvol-project/deepvol-worker:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "deepvol.calibration.worker"]
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-cluster-kafka-bootstrap.kafka.svc:9092"
        - name: KAFKA_TOPIC
          value: "option-quotes"
        - name: REDIS_HOST
          value: "redis-master.deepvol.svc"
        - name: REDIS_PORT
          value: "6379"
        - name: DEVICE
          value: "cuda"
        # SOTA Optimization: PostgreSQL Connection Pool sizing for Worker
        - name: PG_POOL_MIN_SIZE
          value: "5"
        - name: PG_POOL_MAX_SIZE
          value: "20"
        - name: PG_POOL_TIMEOUT
          value: "30.0"
        # SOTA Optimization: Kafka Consumer Tuning for GPU-accelerated workloads
        - name: KAFKA_MAX_POLL_RECORDS
          value: "500"
        - name: KAFKA_FETCH_MIN_BYTES
          value: "1024"
        - name: KAFKA_FETCH_MAX_WAIT_MS
          value: "100"
        - name: KAFKA_SESSION_TIMEOUT_MS
          value: "30000"
        - name: KAFKA_MAX_POLL_INTERVAL_MS
          value: "300000"
        - name: KAFKA_AUTO_OFFSET_RESET
          value: "latest"
        - name: KAFKA_ENABLE_AUTO_COMMIT
          value: "false"
        - name: KAFKA_PARTITION_ASSIGNMENT_STRATEGY
          value: "org.apache.kafka.clients.consumer.CooperativeStickyAssignor"
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: "1"
            memory: 2Gi
            nvidia.com/gpu: "1"
      nodeSelector:
        # GKE Scheduling constraints
        cloud.google.com/gke-gpu: "true"
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
