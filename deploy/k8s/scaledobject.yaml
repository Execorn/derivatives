apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: deepvol-worker-scaler
  namespace: deepvol
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: deepvol-worker
  minReplicaCount: 1
  maxReplicaCount: 8
  cooldownPeriod: 300
  pollingInterval: 15
  triggers:
  - type: kafka
    metadata:
      bootstrapServers: kafka-cluster-kafka-bootstrap.kafka.svc:9092
      consumerGroup: deepvol-calibrator-group
      topic: option-quotes
      lagThreshold: "100"
      activationLagThreshold: "10"
